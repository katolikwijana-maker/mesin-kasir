<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aplikasi Kasir Bluetooth</title>
  
  <!-- Memuat Tailwind CSS untuk Desain -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Memuat React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Memuat Babel (Untuk membaca kode React di dalam HTML) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50">

  <!-- Wadah Aplikasi -->
  <div id="root"></div>

  <!-- Kode React Utama -->
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // --- KUMPULAN ICON (Menggantikan library eksternal) ---
    const Icon = ({ children, size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
    );
    const ShoppingCart = (p) => <Icon {...p}><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></Icon>;
    const Printer = (p) => <Icon {...p}><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></Icon>;
    const Plus = (p) => <Icon {...p}><path d="M5 12h14"/><path d="M12 5v14"/></Icon>;
    const Minus = (p) => <Icon {...p}><path d="M5 12h14"/></Icon>;
    const Trash2 = (p) => <Icon {...p}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></Icon>;
    const AlertCircle = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></Icon>;
    const CheckCircle2 = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></Icon>;
    const Coffee = (p) => <Icon {...p}><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="6" x2="6" y1="2" y2="4"/><line x1="10" x2="10" y1="2" y2="4"/><line x1="14" x2="14" y1="2" y2="4"/></Icon>;
    const Utensils = (p) => <Icon {...p}><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></Icon>;
    const PackageIcon = (p) => <Icon {...p}><line x1="16.5" x2="7.5" y1="9.4" y2="4.2"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" x2="12" y1="22.08" y2="12"/></Icon>;
    const LayoutDashboard = (p) => <Icon {...p}><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></Icon>;
    const ClipboardList = (p) => <Icon {...p}><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/></Icon>;
    const PackageSearch = (p) => <Icon {...p}><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l2-1.14"/><path d="M16.5 9.4 7.55 4.24"/><polyline points="3.29 7 12 12 20.71 7"/><line x1="12" x2="12" y1="22" y2="12"/><circle cx="18.5" cy="15.5" r="2.5"/><path d="M20.27 17.27 22 19"/></Icon>;
    const Edit2 = (p) => <Icon {...p}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></Icon>;
    const X = (p) => <Icon {...p}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></Icon>;
    const Save = (p) => <Icon {...p}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></Icon>;
    const Settings = (p) => <Icon {...p}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></Icon>;
    const Store = (p) => <Icon {...p}><path d="M20.92 8.96 19.33 3.4A2 2 0 0 0 17.41 2H6.59a2 2 0 0 0-1.92 1.4L3.08 8.96A2 2 0 0 0 3 10v2a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-2a2 2 0 0 0-.08-1.04z"/><path d="M5 14v6a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-6"/><path d="M12 14v8"/></Icon>;
    const FileText = (p) => <Icon {...p}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></Icon>;
    const Lock = (p) => <Icon {...p}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></Icon>;
    const LogOut = (p) => <Icon {...p}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></Icon>;

    // --- DATA AWAL ---
    const INITIAL_PRODUCTS = [
      { id: 1, name: 'Kopi Susu Gula Aren', price: 18000, category: 'Minuman' },
      { id: 2, name: 'Americano', price: 15000, category: 'Minuman' },
      { id: 3, name: 'Matcha Latte', price: 22000, category: 'Minuman' },
      { id: 4, name: 'Nasi Goreng Spesial', price: 25000, category: 'Makanan' },
      { id: 5, name: 'Mie Goreng Telur', price: 15000, category: 'Makanan' },
      { id: 6, name: 'Kentang Goreng', price: 12000, category: 'Cemilan' },
      { id: 7, name: 'Roti Bakar Coklat', price: 15000, category: 'Cemilan' },
      { id: 8, name: 'Es Teh Manis', price: 5000, category: 'Minuman' },
    ];

    function App() {
      const [cart, setCart] = useState([]);
      const [printerDevice, setPrinterDevice] = useState(null);
      const [printerCharacteristic, setPrinterCharacteristic] = useState(null);
      const [isConnecting, setIsConnecting] = useState(false);
      const [errorMsg, setErrorMsg] = useState('');
      const [isSupported, setIsSupported] = useState(true);

      const [activeTab, setActiveTab] = useState('kasir');
      const [products, setProducts] = useState(() => {
        const saved = localStorage.getItem('pos_products');
        return saved ? JSON.parse(saved) : INITIAL_PRODUCTS;
      });
      const [salesHistory, setSalesHistory] = useState(() => {
        const saved = localStorage.getItem('pos_sales');
        return saved ? JSON.parse(saved) : [];
      });
      const [storeInfo, setStoreInfo] = useState(() => {
        const saved = localStorage.getItem('pos_store_info');
        return saved ? JSON.parse(saved) : { name: 'POS Kasir Mini', address: 'Jl. GitHub Pages No. 1' };
      });
      
      const [editingId, setEditingId] = useState(null);
      const [formData, setFormData] = useState({ name: '', price: '', category: 'Makanan' });
      const [currentReceipt, setCurrentReceipt] = useState(null);
      const [showPaymentModal, setShowPaymentModal] = useState(false);
      const [cashAmount, setCashAmount] = useState('');

      // State Auth & PIN Login
      const [isAuthenticated, setIsAuthenticated] = useState(false);
      const [pinCode, setPinCode] = useState(() => localStorage.getItem('pos_pin') || '1234');
      const [loginInput, setLoginInput] = useState('');
      const [loginError, setLoginError] = useState('');

      // State Form Ubah PIN
      const [oldPinInput, setOldPinInput] = useState('');
      const [newPinInput, setNewPinInput] = useState('');
      const [confirmPinInput, setConfirmPinInput] = useState('');
      const [pinMessage, setPinMessage] = useState({ type: '', text: '' });

      useEffect(() => { localStorage.setItem('pos_products', JSON.stringify(products)); }, [products]);
      useEffect(() => { localStorage.setItem('pos_sales', JSON.stringify(salesHistory)); }, [salesHistory]);
      useEffect(() => { localStorage.setItem('pos_store_info', JSON.stringify(storeInfo)); }, [storeInfo]);
      useEffect(() => { localStorage.setItem('pos_pin', pinCode); }, [pinCode]);

      const getCategoryIcon = (category) => {
        switch(category?.toLowerCase()) {
          case 'minuman': return <Coffee size={24} />;
          case 'makanan': return <Utensils size={24} />;
          default: return <PackageIcon size={24} />;
        }
      };

      const handleProductSubmit = (e) => {
        e.preventDefault();
        if (!formData.name || !formData.price) return;

        if (editingId) {
          setProducts(products.map(p => p.id === editingId ? { ...p, ...formData, price: Number(formData.price) } : p));
          setEditingId(null);
        } else {
          setProducts([...products, { id: Date.now(), ...formData, price: Number(formData.price) }]);
        }
        setFormData({ name: '', price: '', category: 'Makanan' });
      };

      const handleEditProduct = (product) => {
        setEditingId(product.id);
        setFormData({ name: product.name, price: product.price, category: product.category });
        setActiveTab('produk');
      };

      const handleDeleteProduct = (id) => {
        if (window.confirm('Yakin ingin menghapus produk ini?')) {
          setProducts(products.filter(p => p.id !== id));
          removeFromCart(id);
        }
      };

      useEffect(() => {
        if (!navigator.bluetooth) {
          setIsSupported(false);
          setErrorMsg('Browser ini tidak mendukung Web Bluetooth. Gunakan Chrome atau Edge (Android/PC). iOS tidak didukung.');
        }
      }, []);

      const formatRupiah = (angka) => {
        return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);
      };

      const addToCart = (product) => {
        setCart((prevCart) => {
          const existingItem = prevCart.find((item) => item.product.id === product.id);
          if (existingItem) return prevCart.map((item) => item.product.id === product.id ? { ...item, quantity: item.quantity + 1 } : item);
          return [...prevCart, { product, quantity: 1 }];
        });
      };

      const updateQuantity = (productId, delta) => {
        setCart((prevCart) => prevCart.map((item) => {
            if (item.product.id === productId) {
              const newQuantity = item.quantity + delta;
              return newQuantity > 0 ? { ...item, quantity: newQuantity } : item;
            }
            return item;
          }).filter(item => item.quantity > 0)
        );
      };

      const removeFromCart = (productId) => {
        setCart((prevCart) => prevCart.filter((item) => item.product.id !== productId));
      };

      const total = useMemo(() => cart.reduce((sum, item) => sum + (item.product.price * item.quantity), 0), [cart]);
      const changeAmount = Number(cashAmount) - total;

      // --- LOGIKA BLUETOOTH ---
      const connectToPrinter = async () => {
        setIsConnecting(true);
        setErrorMsg('');
        try {
          const device = await navigator.bluetooth.requestDevice({
            acceptAllDevices: true,
            optionalServices: [
              '000018f0-0000-1000-8000-00805f9b34fb', 'e7810a71-73ae-499d-8c15-faa9aef0c3f2', '49535343-fe7d-4ae5-8fa9-9fafd205e455'
            ]
          });

          const server = await device.gatt.connect();
          const services = await server.getPrimaryServices();
          if (services.length === 0) throw new Error('Tidak ada layanan Bluetooth.');

          let writeCharacteristic = null;
          for (const service of services) {
            const characteristics = await service.getCharacteristics();
            for (const characteristic of characteristics) {
              if (characteristic.properties.write || characteristic.properties.writeWithoutResponse) {
                writeCharacteristic = characteristic; break;
              }
            }
            if (writeCharacteristic) break;
          }

          if (!writeCharacteristic) throw new Error('Printer tidak bisa menerima data.');

          setPrinterDevice(device);
          setPrinterCharacteristic(writeCharacteristic);

          device.addEventListener('gattserverdisconnected', () => {
            setPrinterDevice(null);
            setPrinterCharacteristic(null);
            setErrorMsg('Printer terputus.');
          });

        } catch (err) {
          console.error(err);
          setErrorMsg(err.message || 'Gagal terhubung ke printer.');
        } finally {
          setIsConnecting(false);
        }
      };

      const sendTextToPrinter = async (characteristic, text) => {
        const encoder = new TextEncoder();
        const initCmd = new Uint8Array([0x1B, 0x40]);
        await characteristic.writeValue(initCmd);

        const data = encoder.encode(text);
        for (let i = 0; i < data.length; i += 100) {
          await characteristic.writeValue(data.slice(i, i + 100));
        }

        const feedCmd = new Uint8Array([0x0A, 0x0A, 0x0A]);
        await characteristic.writeValue(feedCmd);
      };

      const padCenter = (str, length) => {
        if (!str) return ' '.repeat(length);
        if (str.length >= length) return str.substring(0, length);
        const leftPad = Math.floor((length - str.length) / 2);
        return ' '.repeat(leftPad) + str + ' '.repeat(length - str.length - leftPad);
      };

      const printReceiptAsPDF = () => {
        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        document.body.appendChild(iframe);

        const html = `
          <html><head><title>Struk_${currentReceipt.id}</title>
            <style>
              @page { margin: 0; size: 58mm auto; }
              body { font-family: 'Courier New', Courier, monospace; width: 58mm; margin: 0 auto; padding: 10px; color: #000; font-size: 12px; }
              .text-center { text-align: center; } .text-right { text-align: right; } .font-bold { font-weight: bold; }
              .divider { border-top: 1px dashed #000; margin: 8px 0; }
              table { width: 100%; border-collapse: collapse; } td { padding: 2px 0; vertical-align: top; }
            </style>
          </head><body>
            <div class="text-center font-bold" style="font-size:14px; margin-bottom:4px;">${storeInfo.name}</div>
            <div class="text-center" style="font-size:10px; margin-bottom:15px;">${storeInfo.address}</div>
            <div style="font-size: 10px; margin-bottom: 8px;">Tanggal: ${currentReceipt.date}</div>
            <div class="divider"></div>
            <table>
              ${currentReceipt.items.map(item => `
                <tr><td colspan="2" class="font-bold">${item.product.name}</td></tr>
                <tr><td>${item.quantity}x ${formatRupiah(item.product.price)}</td><td class="text-right">${formatRupiah(item.quantity * item.product.price)}</td></tr>
              `).join('')}
            </table>
            <div class="divider"></div>
            <table>
              <tr><td class="font-bold" style="font-size:14px;">TOTAL</td><td class="text-right font-bold" style="font-size:14px;">${formatRupiah(currentReceipt.total)}</td></tr>
              <tr><td class="font-bold" style="font-size:12px;">TUNAI</td><td class="text-right" style="font-size:12px;">${formatRupiah(currentReceipt.cash || 0)}</td></tr>
              <tr><td class="font-bold" style="font-size:12px;">KEMBALI</td><td class="text-right font-bold" style="font-size:12px;">${formatRupiah(currentReceipt.change || 0)}</td></tr>
            </table>
            <div class="divider"></div>
            <div class="text-center" style="font-size: 10px; margin-top: 10px;">Terima Kasih</div>
            <div class="text-center" style="font-size: 10px; margin-top: 2px;">Silakan datang kembali :)</div>
          </body></html>
        `;

        iframe.contentWindow.document.open();
        iframe.contentWindow.document.write(html);
        iframe.contentWindow.document.close();

        setTimeout(() => {
          try { iframe.contentWindow.focus(); iframe.contentWindow.print(); } catch (e) { window.print(); }
          setTimeout(() => { if (document.body.contains(iframe)) document.body.removeChild(iframe); }, 1000);
        }, 500);
      };

      const printSalesSummaryAsPDF = () => {
        if (salesHistory.length === 0) return alert('Tidak ada data rekap untuk dicetak.');
        
        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        document.body.appendChild(iframe);

        const grandTotal = salesHistory.reduce((sum, sale) => sum + sale.total, 0);
        const printDate = new Date().toLocaleString('id-ID');

        const html = `
          <html><head><title>Rekap_Penjualan_${storeInfo.name}</title>
            <style>
              @page { margin: 20mm; size: A4 portrait; }
              body { font-family: sans-serif; color: #333; font-size: 14px; line-height: 1.5; }
              .text-center { text-align: center; } .text-right { text-align: right; } .font-bold { font-weight: bold; }
              table { width: 100%; border-collapse: collapse; margin-top: 20px; }
              th, td { border: 1px solid #ddd; padding: 10px; text-align: left; vertical-align: top; }
              th { background-color: #f8f9fa; }
              .header { margin-bottom: 20px; border-bottom: 2px solid #000; padding-bottom: 10px; }
              .item-list { font-size: 12px; color: #555; }
            </style>
          </head><body>
            <div class="header">
              <h1 class="text-center" style="margin:0 0 5px 0;">${storeInfo.name}</h1>
              <p class="text-center" style="margin:0; color:#555;">${storeInfo.address}</p>
              <h2 class="text-center" style="margin:15px 0 5px 0; font-size: 18px;">Laporan Rekap Penjualan</h2>
              <p class="text-center" style="margin:0; font-size:12px; color:#777;">Dicetak pada: ${printDate}</p>
            </div>
            <table>
              <thead>
                <tr>
                  <th style="width: 5%;">No</th>
                  <th style="width: 25%;">Waktu Transaksi</th>
                  <th style="width: 45%;">Rincian Item</th>
                  <th class="text-right" style="width: 25%;">Total</th>
                </tr>
              </thead>
              <tbody>
                ${salesHistory.map((sale, index) => `
                  <tr>
                    <td>${index + 1}</td>
                    <td>${sale.date}</td>
                    <td class="item-list">
                      ${sale.items.map(item => `${item.quantity}x ${item.product.name}`).join('<br>')}
                    </td>
                    <td class="text-right font-bold">${formatRupiah(sale.total)}</td>
                  </tr>
                `).join('')}
              </tbody>
              <tfoot>
                <tr>
                  <td colspan="3" class="text-right font-bold" style="font-size: 16px;">TOTAL PENDAPATAN</td>
                  <td class="text-right font-bold" style="font-size: 16px; color: #16a34a;">${formatRupiah(grandTotal)}</td>
                </tr>
              </tfoot>
            </table>
          </body></html>
        `;

        iframe.contentWindow.document.open();
        iframe.contentWindow.document.write(html);
        iframe.contentWindow.document.close();

        setTimeout(() => {
          try { iframe.contentWindow.focus(); iframe.contentWindow.print(); } catch (e) { window.print(); }
          setTimeout(() => { if (document.body.contains(iframe)) document.body.removeChild(iframe); }, 1000);
        }, 500);
      };

      const printBluetooth = async (saleData) => {
        if (!printerCharacteristic) return alert('Printer Bluetooth belum terhubung!');
        try {
          let receiptText = "";
          receiptText += padCenter(storeInfo.name, 32) + "\n";
          receiptText += padCenter(storeInfo.address, 32) + "\n";
          receiptText += "================================\n";
          
          saleData.items.forEach(item => {
            receiptText += `${item.product.name}\n`;
            const qtyPrice = `${item.quantity} x ${item.product.price}`;
            const subtotal = `${item.quantity * item.product.price}`;
            const spaces = Math.max(1, 32 - qtyPrice.length - subtotal.length);
            receiptText += `${qtyPrice}${' '.repeat(spaces)}${subtotal}\n`;
          });
          
          receiptText += "================================\n";
          const totalStr = `${saleData.total}`;
          const totalLabel = "TOTAL:";
          const totalSpaces = 32 - totalLabel.length - totalStr.length;
          receiptText += `${totalLabel}${totalSpaces > 0 ? ' '.repeat(totalSpaces) : ' '}${totalStr}\n`;
          
          const cashStr = `${saleData.cash || 0}`;
          const cashLabel = "TUNAI:";
          const cashSpaces = 32 - cashLabel.length - cashStr.length;
          receiptText += `${cashLabel}${cashSpaces > 0 ? ' '.repeat(cashSpaces) : ' '}${cashStr}\n`;

          const changeStr = `${saleData.change || 0}`;
          const changeLabel = "KEMBALI:";
          const changeSpaces = 32 - changeLabel.length - changeStr.length;
          receiptText += `${changeLabel}${changeSpaces > 0 ? ' '.repeat(changeSpaces) : ' '}${changeStr}\n`;
          
          receiptText += "================================\n";
          receiptText += "          Terima Kasih         \n   Silakan datang kembali :)   \n\n\n";

          await sendTextToPrinter(printerCharacteristic, receiptText);
          alert('Struk berhasil dicetak via Bluetooth!');
        } catch (err) {
          alert('Gagal mencetak struk via Bluetooth: ' + err.message);
        }
      };

      const handlePayment = () => {
        if (cart.length === 0) return alert('Keranjang kosong!');
        setCashAmount('');
        setShowPaymentModal(true);
      };

      const processPayment = () => {
        if (changeAmount < 0) return alert('Uang tunai kurang!');
        const newSale = { id: Date.now(), date: new Date().toLocaleString('id-ID'), items: [...cart], total, cash: Number(cashAmount), change: changeAmount };
        setSalesHistory(prev => [newSale, ...prev]);
        setCart([]); 
        setShowPaymentModal(false);
        setCurrentReceipt(newSale);
      };

      const handleLogin = (e) => {
        e.preventDefault();
        if (loginInput === pinCode) {
          setIsAuthenticated(true);
          setLoginError('');
          setLoginInput('');
        } else {
          setLoginError('PIN salah! Silakan coba lagi.');
        }
      };

      const handleLogout = () => {
        if (window.confirm('Yakin ingin keluar dari sistem kasir?')) {
          setIsAuthenticated(false);
          setActiveTab('kasir'); // Reset tab saat login ulang
        }
      };

      const handleChangePin = (e) => {
        e.preventDefault();
        if (oldPinInput !== pinCode) {
          setPinMessage({ type: 'error', text: 'PIN Lama salah!' });
          return;
        }
        if (newPinInput !== confirmPinInput) {
          setPinMessage({ type: 'error', text: 'Konfirmasi PIN Baru tidak cocok!' });
          return;
        }
        if (newPinInput.length < 4) {
          setPinMessage({ type: 'error', text: 'PIN Baru harus minimal 4 karakter!' });
          return;
        }
        setPinCode(newPinInput);
        setPinMessage({ type: 'success', text: 'PIN berhasil diubah!' });
        setOldPinInput('');
        setNewPinInput('');
        setConfirmPinInput('');
        setTimeout(() => setPinMessage({ type: '', text: '' }), 3000);

                        <span className="text-gray-600 font-medium">Kembalian</span>
                        <span className={`text-xl font-bold ${changeAmount < 0 ? 'text-red-500' : 'text-green-600'}`}>
                          {cashAmount === '' ? '-' : formatRupiah(changeAmount)}
                        </span>
                      </div>
                    </div>
                    <div className="p-4 bg-gray-50 border-t border-gray-100">
                      <button onClick={processPayment} disabled={cashAmount === '' || changeAmount < 0} className="w-full py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors">
                        Selesaikan Pembayaran
                      </button>
                    </div>
                  </div>
                </div>
              )}

              {/* MODAL PREVIEW STRUK */}
              {currentReceipt && (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                  <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden flex flex-col max-h-[90vh]">
                    <div className="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                      <h3 className="font-bold text-gray-800 flex items-center gap-2"><FileText size={18} className="text-blue-600" /> Preview Struk</h3>
                      <button onClick={() => setCurrentReceipt(null)} className="p-1 hover:bg-gray-200 rounded-full text-gray-500"><X size={20} /></button>
                    </div>
                    
                    <div className="flex-1 overflow-y-auto p-6 bg-gray-200 flex justify-center">
                      <div className="bg-white w-full shadow-sm p-4 font-mono text-sm text-gray-800 flex flex-col border border-gray-300" style={{ maxWidth: '300px' }}>
                        <div className="text-center font-bold text-base mb-1">{storeInfo.name}</div>
                        <div className="text-center text-xs mb-4 pb-4 border-b border-dashed border-gray-300">{storeInfo.address}</div>
                        <div className="text-xs mb-3">Tanggal: {currentReceipt.date}</div>
                        <div className="flex flex-col gap-2 mb-4 pb-4 border-b border-dashed border-gray-300">
                          {currentReceipt.items.map((item, idx) => (
                            <div key={idx}><div className="font-bold">{item.product.name}</div><div className="flex justify-between"><span>{item.quantity} x {formatRupiah(item.product.price)}</span><span>{formatRupiah(item.quantity * item.product.price)}</span></div></div>
                          ))}
                        </div>
                        <div className="flex justify-between font-bold text-base mb-1"><span>TOTAL</span><span>{formatRupiah(currentReceipt.total)}</span></div>
                        <div className="flex justify-between text-sm mb-1"><span>TUNAI</span><span>{formatRupiah(currentReceipt.cash || 0)}</span></div>
                        <div className="flex justify-between text-sm font-bold mb-6"><span>KEMBALI</span><span>{formatRupiah(currentReceipt.change || 0)}</span></div>
                        <div className="text-center text-xs">Terima Kasih</div><div className="text-center text-xs">Silakan datang kembali :)</div>
                      </div>
                    </div>

                    <div className="p-4 bg-white border-t border-gray-100 flex flex-col gap-2">
                      <button onClick={() => printBluetooth(currentReceipt)} className="w-full py-2.5 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 flex justify-center items-center gap-2"><Printer size={18} /> Cetak via Bluetooth</button>
                      <button onClick={printReceiptAsPDF} className="w-full py-2.5 bg-gray-100 text-gray-700 rounded-xl font-bold hover:bg-gray-200 flex justify-center items-center gap-2 border border-gray-200"><FileText size={18} /> Cetak PDF / Web</button>
                      <button onClick={() => setCurrentReceipt(null)} className="w-full py-2.5 bg-white text-red-500 rounded-xl font-bold hover:bg-red-50 flex justify-center items-center gap-2 border border-red-100 mt-1">Tutup</button>
                    </div>
                  </div>
                </div>
              )}

            </main>
          </div>

          {/* MODE CETAK TERSEMBUNYI */}
          {currentReceipt && (
            <div className="hidden print:block font-mono text-black bg-white w-full mx-auto text-[12px] leading-tight" style={{ maxWidth: '58mm' }}>
              <div className="text-center font-bold text-sm mb-1">{storeInfo.name}</div>
              <div className="text-center text-[10px] mb-3 pb-3 border-b border-dashed border-black">{storeInfo.address}</div>
              <div className="text-[10px] mb-2">Tanggal: {currentReceipt.date}</div>
              <div className="flex flex-col gap-1.5 mb-3 pb-3 border-b border-dashed border-black">
                {currentReceipt.items.map((item, idx) => (
                  <div key={idx}><div className="font-bold">{item.product.name}</div><div className="flex justify-between"><span>{item.quantity}x {formatRupiah(item.product.price)}</span><span>{formatRupiah(item.quantity * item.product.price)}</span></div></div>
                ))}
              </div>
              <div className="flex justify-between font-bold text-sm mb-1"><span>TOTAL</span><span>{formatRupiah(currentReceipt.total)}</span></div>
              <div className="flex justify-between text-[10px] mb-1"><span>TUNAI</span><span>{formatRupiah(currentReceipt.cash || 0)}</span></div>
              <div className="flex justify-between text-[10px] font-bold mb-5"><span>KEMBALI</span><span>{formatRupiah(currentReceipt.change || 0)}</span></div>
              <div className="text-center text-[10px]">Terima Kasih</div><div className="text-center text-[10px]">Silakan datang kembali :)</div>
            </div>
          )}
        </React.Fragment>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
