<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KASIR.PRO v2.5 - Enterprise Grade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-font-smoothing: antialiased; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; }
            .print-area { width: 100%; box-shadow: none !important; border: none !important; }
        }
        .animate-in { animation: fadeIn 0.25s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#F1F5F9] text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        // --- UTILS ---
        const formatIDR = (val) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(val);
        const generateID = () => Math.random().toString(36).substr(2, 9).toUpperCase();

        // --- COMPONENTS ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const [mounted, setMounted] = useState(false);
            useEffect(() => {
                setMounted(true);
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const MOCK_DATA = [
            { id: 'p1', sku: 'COF-001', name: 'Es Kopi Susu Gula Aren', category: 'Minuman', cost: 8000, price: 18000, stock: 50, image: '☕' },
            { id: 'p2', sku: 'COF-002', name: 'Caramel Macchiato', category: 'Minuman', cost: 12000, price: 28000, stock: 30, image: '🥤' },
            { id: 'p3', sku: 'FOD-001', name: 'Croissant Almond', category: 'Makanan', cost: 15000, price: 25000, stock: 15, image: '🥐' },
            { id: 'p4', sku: 'FOD-002', name: 'Beef Burger Deluxe', category: 'Makanan', cost: 22000, price: 45000, stock: 10, image: '🍔' }
        ];

        function App() {
            // --- STATE PERSISTENCE ---
            const [products, setProducts] = useState(() => {
                const saved = localStorage.getItem('kp_products');
                return saved ? JSON.parse(saved) : MOCK_DATA;
            });

            const [transactions, setTransactions] = useState(() => {
                const saved = localStorage.getItem('kp_transactions');
                return saved ? JSON.parse(saved) : [];
            });

            const [settings, setSettings] = useState(() => {
                const saved = localStorage.getItem('kp_settings');
                return saved ? JSON.parse(saved) : { storeName: 'KEDAI KOPI PRO', address: 'Jl. Utama No. 88, Jakarta', taxRate: 11 };
            });

            const [cart, setCart] = useState([]);
            const [activeTab, setActiveTab] = useState('pos');
            const [search, setSearch] = useState('');
            const [category, setCategory] = useState('Semua');
            const [isCheckingOut, setIsCheckingOut] = useState(false);
            const [showReceipt, setShowReceipt] = useState(null);
            const [editProduct, setEditProduct] = useState(null);

            // Save to LocalStorage on change
            useEffect(() => localStorage.setItem('kp_products', JSON.stringify(products)), [products]);
            useEffect(() => localStorage.setItem('kp_transactions', JSON.stringify(transactions)), [transactions]);
            useEffect(() => localStorage.setItem('kp_settings', JSON.stringify(settings)), [settings]);

            // --- COMPUTED ---
            const categories = ['Semua', ...new Set(products.map(p => p.category))];
            const filteredProducts = products.filter(p => 
                (category === 'Semua' || p.category === category) &&
                (p.name.toLowerCase().includes(search.toLowerCase()) || p.sku.toLowerCase().includes(search.toLowerCase()))
            );

            const cartTotals = useMemo(() => {
                const subtotal = cart.reduce((acc, item) => acc + (item.price * item.qty), 0);
                const tax = Math.round(subtotal * (settings.taxRate / 100));
                return { subtotal, tax, total: subtotal + tax };
            }, [cart, settings.taxRate]);

            // --- HANDLERS ---
            const addToCart = (product) => {
                if (product.stock <= 0) return;
                setCart(prev => {
                    const existing = prev.find(item => item.id === product.id);
                    if (existing) {
                        if (existing.qty >= product.stock) return prev;
                        return prev.map(item => item.id === product.id ? { ...item, qty: item.qty + 1 } : item);
                    }
                    return [...prev, { ...product, qty: 1 }];
                });
            };

            const updateCartQty = (id, delta) => {
                setCart(prev => prev.map(item => {
                    if (item.id === id) {
                        const newQty = item.qty + delta;
                        const product = products.find(p => p.id === id);
                        if (newQty > 0 && newQty <= product.stock) return { ...item, qty: newQty };
                    }
                    return item;
                }).filter(item => item.qty > 0));
            };

            const finalizeTransaction = (method) => {
                // Bug fix: Check stock one last time
                const hasStockError = cart.some(item => {
                    const p = products.find(prod => prod.id === item.id);
                    return p.stock < item.qty;
                });

                if (hasStockError) {
                    alert("Maaf, stok beberapa item berubah. Transaksi dibatalkan.");
                    return;
                }

                const transactionId = `TRX-${Date.now().toString().slice(-6)}`;
                const newTrx = {
                    id: transactionId,
                    date: new Date().toISOString(),
                    items: cart,
                    ...cartTotals,
                    method,
                    profit: cart.reduce((acc, item) => acc + ((item.price - item.cost) * item.qty), 0)
                };

                // Update Stocks
                setProducts(prev => prev.map(p => {
                    const inCart = cart.find(c => c.id === p.id);
                    return inCart ? { ...p, stock: p.stock - inCart.qty } : p;
                }));

                setTransactions(prev => [newTrx, ...prev]);
                setShowReceipt(newTrx);
                setCart([]);
                setIsCheckingOut(false);
            };

            const saveProduct = (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const data = {
                    id: editProduct?.id || generateID(),
                    sku: fd.get('sku'),
                    name: fd.get('name'),
                    category: fd.get('category'),
                    cost: Number(fd.get('cost')),
                    price: Number(fd.get('price')),
                    stock: Number(fd.get('stock')),
                    image: fd.get('image') || '📦'
                };

                if (editProduct?.id) {
                    setProducts(prev => prev.map(p => p.id === data.id ? data : p));
                } else {
                    setProducts(prev => [...prev, data]);
                }
                setEditProduct(null);
            };

            return (
                <div className="flex h-screen bg-[#F8FAFC]">
                    {/* SIDEBAR */}
                    <aside className="w-64 bg-slate-900 text-slate-400 p-6 flex flex-col no-print hidden md:flex">
                        <div className="flex items-center gap-3 text-white mb-10 px-2">
                            <div className="bg-blue-600 p-2 rounded-lg"><Icon name="Zap" className="text-white" /></div>
                            <span className="font-bold text-xl tracking-tight">KASIR.PRO</span>
                        </div>
                        <nav className="flex-1 space-y-1">
                            {[
                                { id: 'pos', icon: 'ShoppingCart', label: 'Point of Sale' },
                                { id: 'inventory', icon: 'Package', label: 'Inventaris' },
                                { id: 'history', icon: 'Clock', label: 'Riwayat' },
                                { id: 'settings', icon: 'Settings', label: 'Pengaturan' }
                            ].map(item => (
                                <button 
                                    key={item.id}
                                    onClick={() => setActiveTab(item.id)}
                                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${activeTab === item.id ? 'bg-blue-600 text-white font-semibold' : 'hover:bg-slate-800 hover:text-white'}`}
                                >
                                    <Icon name={item.icon} size={18} />
                                    <span className="text-sm">{item.label}</span>
                                </button>
                            ))}
                        </nav>
                    </aside>

                    {/* MAIN */}
                    <main className="flex-1 flex flex-col min-w-0 bg-[#F1F5F9] no-print">
                        
                        {activeTab === 'pos' && (
                            <div className="flex h-full animate-in">
                                <div className="flex-1 flex flex-col p-6 overflow-hidden">
                                    <div className="flex justify-between items-center mb-6">
                                        <h1 className="text-2xl font-extrabold text-slate-800 uppercase tracking-tight">Katalog Menu</h1>
                                        <div className="relative w-72">
                                            <Icon name="Search" size={16} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />
                                            <input 
                                                className="w-full pl-10 pr-4 py-2.5 bg-white border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500/20 transition-all text-sm shadow-sm"
                                                placeholder="Cari menu atau SKU..."
                                                value={search}
                                                onChange={(e) => setSearch(e.target.value)}
                                            />
                                        </div>
                                    </div>

                                    <div className="flex gap-2 overflow-x-auto pb-4 no-scrollbar mb-4">
                                        {categories.map(cat => (
                                            <button 
                                                key={cat}
                                                onClick={() => setCategory(cat)}
                                                className={`px-5 py-2 rounded-full text-xs font-bold transition-all whitespace-nowrap shadow-sm border ${category === cat ? 'bg-slate-800 text-white border-slate-800' : 'bg-white text-slate-500 border-slate-100 hover:bg-slate-200'}`}
                                            >
                                                {cat}
                                            </button>
                                        ))}
                                    </div>

                                    <div className="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 overflow-y-auto pr-2 custom-scrollbar">
                                        {filteredProducts.map(p => (
                                            <button 
                                                key={p.id}
                                                disabled={p.stock <= 0}
                                                onClick={() => addToCart(p)}
                                                className="group bg-white p-4 rounded-3xl border border-slate-200 text-left hover:shadow-xl hover:shadow-blue-500/5 transition-all flex flex-col relative overflow-hidden active:scale-95 disabled:opacity-50 disabled:grayscale disabled:scale-100"
                                            >
                                                <div className="text-4xl mb-4 bg-slate-50 w-full aspect-square rounded-2xl flex items-center justify-center group-hover:bg-blue-50 transition-colors">
                                                    {p.image}
                                                </div>
                                                <h3 className="font-bold text-slate-800 text-sm line-clamp-2 h-10 mb-1">{p.name}</h3>
                                                <div className="flex justify-between items-end mt-2 pt-2 border-t border-slate-50">
                                                    <span className="text-blue-600 font-extrabold">{formatIDR(p.price).replace(',00','')}</span>
                                                    <span className={`text-[9px] font-black uppercase px-2 py-0.5 rounded-full ${p.stock < 5 ? 'bg-red-50 text-red-500' : 'bg-slate-100 text-slate-500'}`}>Stok: {p.stock}</span>
                                                </div>
                                                {p.stock <= 0 && <div className="absolute inset-0 bg-white/60 flex items-center justify-center font-black text-red-600 text-[10px] uppercase tracking-widest">Habis</div>}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {/* CART PANEL */}
                                <div className="w-96 bg-white border-l border-slate-200 flex flex-col shadow-xl">
                                    <div className="p-6 border-b border-slate-100 flex justify-between items-center">
                                        <h2 className="font-extrabold text-slate-800 tracking-tight">KERANJANG</h2>
                                        <button onClick={() => setCart([])} className="text-slate-300 hover:text-red-500"><Icon name="Trash2" size={18}/></button>
                                    </div>
                                    <div className="flex-1 overflow-y-auto p-4 space-y-3 custom-scrollbar">
                                        {cart.length === 0 ? (
                                            <div className="h-full flex flex-col items-center justify-center text-slate-300 opacity-50 px-10 text-center">
                                                <Icon name="ShoppingBag" size={48} strokeWidth={1} />
                                                <p className="mt-4 text-xs font-bold uppercase tracking-widest leading-relaxed">Pesanan Anda akan muncul di sini</p>
                                            </div>
                                        ) : cart.map(item => (
                                            <div key={item.id} className="flex gap-3 p-3 bg-slate-50 rounded-2xl border border-slate-100 animate-in">
                                                <div className="w-12 h-12 bg-white rounded-xl flex items-center justify-center text-2xl shadow-sm">{item.image}</div>
                                                <div className="flex-1 min-w-0">
                                                    <p className="font-bold text-xs text-slate-800 truncate">{item.name}</p>
                                                    <p className="text-[10px] text-blue-600 font-extrabold mt-0.5">{formatIDR(item.price * item.qty).replace(',00','')}</p>
                                                </div>
                                                <div className="flex items-center gap-2 bg-white px-1.5 py-1 rounded-xl border border-slate-100 shadow-sm self-center">
                                                    <button onClick={() => updateCartQty(item.id, -1)} className="p-1 hover:text-red-500"><Icon name="Minus" size={12}/></button>
                                                    <span className="text-xs font-black w-4 text-center">{item.qty}</span>
                                                    <button onClick={() => updateCartQty(item.id, 1)} className="p-1 hover:text-blue-500"><Icon name="Plus" size={12}/></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="p-6 bg-slate-50/50 border-t border-slate-200 space-y-4">
                                        <div className="space-y-1.5 text-[10px] font-bold uppercase text-slate-400 tracking-wider">
                                            <div className="flex justify-between"><span>Subtotal</span><span className="text-slate-700">{formatIDR(cartTotals.subtotal)}</span></div>
                                            <div className="flex justify-between"><span>Pajak ({settings.taxRate}%)</span><span className="text-slate-700">{formatIDR(cartTotals.tax)}</span></div>
                                        </div>
                                        <div className="flex justify-between items-center pt-2">
                                            <span className="text-xs font-black text-slate-800 uppercase">Total Akhir</span>
                                            <span className="text-2xl font-black text-blue-600 tracking-tighter">{formatIDR(cartTotals.total)}</span>
                                        </div>
                                        <button 
                                            disabled={cart.length === 0}
                                            onClick={() => setIsCheckingOut(true)}
                                            className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-sm shadow-lg hover:bg-black transition-all active:scale-[0.98] disabled:opacity-20"
                                        >
                                            BAYAR SEKARANG
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'inventory' && (
                            <div className="p-8 h-full flex flex-col animate-in">
                                <div className="flex justify-between items-center mb-8">
                                    <h1 className="text-2xl font-extrabold text-slate-800 uppercase tracking-tight">Inventaris & Harga</h1>
                                    <button 
                                        onClick={() => setEditProduct({})} 
                                        className="bg-blue-600 text-white px-6 py-2.5 rounded-xl font-bold text-sm shadow-lg shadow-blue-200 flex items-center gap-2 hover:bg-blue-700 transition-all"
                                    >
                                        <Icon name="PlusCircle" size={18} /> Tambah Menu
                                    </button>
                                </div>
                                <div className="flex-1 bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden flex flex-col">
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left border-collapse">
                                            <thead className="bg-slate-50 border-b border-slate-100">
                                                <tr>
                                                    <th className="p-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Informasi Produk</th>
                                                    <th className="p-5 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">Modal</th>
                                                    <th className="p-5 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">Harga Jual</th>
                                                    <th className="p-5 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Stok</th>
                                                    <th className="p-5 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Aksi</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50">
                                                {products.map(p => (
                                                    <tr key={p.id} className="hover:bg-slate-50/50 transition-colors">
                                                        <td className="p-5 flex items-center gap-4">
                                                            <div className="w-12 h-12 bg-slate-100 rounded-xl flex items-center justify-center text-2xl">{p.image}</div>
                                                            <div>
                                                                <p className="font-bold text-sm text-slate-800">{p.name}</p>
                                                                <p className="text-[10px] text-slate-400 font-bold uppercase tracking-wider">{p.sku} • {p.category}</p>
                                                            </div>
                                                        </td>
                                                        <td className="p-5 text-right font-medium text-slate-500 text-sm">{formatIDR(p.cost)}</td>
                                                        <td className="p-5 text-right font-bold text-blue-600 text-sm">{formatIDR(p.price)}</td>
                                                        <td className="p-5 text-center">
                                                            <span className={`px-3 py-1 rounded-full text-xs font-bold ${p.stock < 10 ? 'bg-red-50 text-red-600' : 'bg-green-50 text-green-600'}`}>
                                                                {p.stock}
                                                            </span>
                                                        </td>
                                                        <td className="p-5">
                                                            <div className="flex justify-center gap-1">
                                                                <button onClick={() => setEditProduct(p)} className="p-2 text-slate-400 hover:text-blue-600 transition-colors"><Icon name="Edit3" size={16}/></button>
                                                                <button onClick={() => { if(confirm('Hapus item ini?')) setProducts(prev => prev.filter(i => i.id !== p.id)) }} className="p-2 text-slate-400 hover:text-red-500 transition-colors"><Icon name="Trash2" size={16}/></button>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'history' && (
                            <div className="p-8 h-full flex flex-col animate-in">
                                <h1 className="text-2xl font-extrabold text-slate-800 uppercase tracking-tight mb-8">Riwayat Penjualan</h1>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 no-print">
                                    <div className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Total Omzet</p>
                                        <p className="text-2xl font-black text-slate-800">{formatIDR(transactions.reduce((acc, t) => acc + t.total, 0))}</p>
                                    </div>
                                    <div className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Laba Bersih</p>
                                        <p className="text-2xl font-black text-green-600">{formatIDR(transactions.reduce((acc, t) => acc + t.profit, 0))}</p>
                                    </div>
                                    <div className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Total Transaksi</p>
                                        <p className="text-2xl font-black text-slate-800">{transactions.length}</p>
                                    </div>
                                </div>
                                <div className="flex-1 bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden overflow-y-auto custom-scrollbar">
                                    <table className="w-full text-left border-collapse">
                                        <thead className="bg-slate-50 border-b border-slate-100">
                                            <tr>
                                                <th className="p-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">ID Invoice</th>
                                                <th className="p-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Waktu</th>
                                                <th className="p-5 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Metode</th>
                                                <th className="p-5 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">Nominal</th>
                                                <th className="p-5 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Aksi</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-50">
                                            {transactions.map(t => (
                                                <tr key={t.id} className="hover:bg-slate-50/50 transition-colors">
                                                    <td className="p-5 font-bold text-sm text-slate-800">{t.id}</td>
                                                    <td className="p-5 text-xs text-slate-500">{new Date(t.date).toLocaleString('id-ID')}</td>
                                                    <td className="p-5 text-center"><span className="px-2 py-0.5 bg-slate-100 text-[10px] font-black rounded-lg">{t.method}</span></td>
                                                    <td className="p-5 text-right font-black text-slate-800 text-sm">{formatIDR(t.total)}</td>
                                                    <td className="p-5 text-center">
                                                        <button onClick={() => setShowReceipt(t)} className="text-blue-500 hover:text-blue-700 font-bold text-xs">LIHAT STRUK</button>
                                                    </td>
                                                </tr>
                                            ))}
                                            {transactions.length === 0 && (
                                                <tr><td colSpan="5" className="p-20 text-center text-slate-300 italic text-sm">Belum ada transaksi terekam.</td></tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {activeTab === 'settings' && (
                            <div className="p-8 max-w-2xl animate-in">
                                <h1 className="text-2xl font-extrabold text-slate-800 uppercase tracking-tight mb-8">Pengaturan Toko</h1>
                                <div className="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm space-y-6">
                                    <div className="space-y-1.5">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Nama Outlet</label>
                                        <input value={settings.storeName} onChange={e => setSettings({...settings, storeName: e.target.value})} className="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-blue-500 font-bold" />
                                    </div>
                                    <div className="space-y-1.5">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Alamat Lengkap</label>
                                        <textarea value={settings.address} onChange={e => setSettings({...settings, address: e.target.value})} rows="3" className="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-blue-500 font-bold" />
                                    </div>
                                    <div className="space-y-1.5">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Pajak / PB1 (%)</label>
                                        <input type="number" value={settings.taxRate} onChange={e => setSettings({...settings, taxRate: Number(e.target.value)})} className="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-blue-500 font-bold" />
                                    </div>
                                    <button onClick={() => alert('Disimpan ke browser!')} className="w-full py-4 bg-slate-900 text-white font-black rounded-2xl shadow-xl shadow-slate-200 hover:bg-black transition-all">SIMPAN PERUBAHAN</button>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* MODAL: CHECKOUT */}
                    {isCheckingOut && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-sm animate-in no-print">
                            <div className="bg-white rounded-[2.5rem] w-full max-w-sm overflow-hidden shadow-2xl">
                                <div className="p-10 bg-slate-900 text-white text-center">
                                    <p className="text-[10px] font-black text-slate-400 tracking-[0.3em] uppercase mb-2">Total Tagihan</p>
                                    <h2 className="text-4xl font-black tracking-tighter">{formatIDR(cartTotals.total).replace(',00','')}</h2>
                                </div>
                                <div className="p-8 space-y-4">
                                    <button onClick={() => finalizeTransaction('TUNAI')} className="w-full flex items-center justify-between p-5 rounded-2xl border-2 border-slate-100 hover:border-blue-500 hover:bg-blue-50 transition-all font-black text-xs uppercase tracking-widest group">
                                        <div className="flex items-center gap-4"><Icon name="Banknote" size={24} className="text-slate-400 group-hover:text-blue-500"/> TUNAI / CASH</div>
                                        <Icon name="ChevronRight" size={16}/>
                                    </button>
                                    <button onClick={() => finalizeTransaction('QRIS')} className="w-full flex items-center justify-between p-5 rounded-2xl border-2 border-slate-100 hover:border-blue-500 hover:bg-blue-50 transition-all font-black text-xs uppercase tracking-widest group">
                                        <div className="flex items-center gap-4"><Icon name="QrCode" size={24} className="text-slate-400 group-hover:text-blue-500"/> QRIS / E-WALLET</div>
                                        <Icon name="ChevronRight" size={16}/>
                                    </button>
                                    <button onClick={() => setIsCheckingOut(false)} className="w-full pt-4 text-[10px] font-black text-slate-400 uppercase hover:text-slate-600 transition-colors">Batal</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL: RECEIPT */}
                    {showReceipt && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center p-6 bg-slate-900/80 backdrop-blur-md animate-in no-print">
                            <div className="bg-white rounded-[2rem] w-full max-w-sm shadow-2xl flex flex-col overflow-hidden max-h-[90vh]">
                                <div className="flex-1 overflow-y-auto p-10 bg-white font-mono text-[11px] leading-relaxed text-slate-700 print-area custom-scrollbar" id="printable-receipt">
                                    <div className="text-center mb-8 border-b-2 border-dashed border-slate-200 pb-6">
                                        <h3 className="text-lg font-black text-slate-900 leading-none uppercase mb-1">{settings.storeName}</h3>
                                        <p className="text-[9px] uppercase tracking-tighter opacity-60 mb-4">{settings.address}</p>
                                        <div className="flex justify-between text-[9px] font-bold mt-2 pt-2 border-t border-slate-50 italic opacity-40">
                                            <span>#{showReceipt.id}</span>
                                            <span>{new Date(showReceipt.date).toLocaleString('id-ID')}</span>
                                        </div>
                                    </div>
                                    <div className="space-y-3 mb-8">
                                        {showReceipt.items.map(item => (
                                            <div key={item.id} className="flex justify-between items-start">
                                                <div className="flex-1 pr-6">
                                                    <p className="font-bold uppercase leading-tight">{item.name}</p>
                                                    <p className="text-[9px] opacity-50">{item.qty} x {formatIDR(item.price)}</p>
                                                </div>
                                                <p className="font-bold whitespace-nowrap">{formatIDR(item.price * item.qty).replace(',00','')}</p>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="border-t-2 border-dashed border-slate-200 pt-5 space-y-1.5">
                                        <div className="flex justify-between font-medium opacity-60"><span>Subtotal</span><span>{formatIDR(showReceipt.subtotal).replace(',00','')}</span></div>
                                        <div className="flex justify-between font-medium opacity-60"><span>Pajak ({settings.taxRate}%)</span><span>{formatIDR(showReceipt.tax).replace(',00','')}</span></div>
                                        <div className="flex justify-between text-base font-black text-slate-900 mt-2 pt-2 border-t border-slate-100"><span>TOTAL</span><span>{formatIDR(showReceipt.total).replace(',00','')}</span></div>
                                    </div>
                                    <div className="mt-10 pt-10 border-t-2 border-dashed border-slate-200 text-center">
                                        <div className="inline-block border border-slate-200 px-3 py-1 rounded-full text-[9px] font-black uppercase mb-4 tracking-widest">{showReceipt.method}</div>
                                        <p className="text-[10px] font-bold italic opacity-40">-- Terima Kasih Telah Berkunjung --</p>
                                    </div>
                                </div>
                                <div className="p-6 bg-slate-50 border-t border-slate-200 flex gap-4">
                                    <button onClick={() => setShowReceipt(null)} className="flex-1 py-3 text-slate-400 font-black text-[10px] uppercase tracking-widest hover:text-slate-600 transition-colors">Tutup</button>
                                    <button onClick={() => window.print()} className="flex-1 py-3 bg-blue-600 text-white rounded-xl font-black text-[10px] uppercase tracking-widest flex items-center justify-center gap-2 shadow-lg shadow-blue-200"><Icon name="Printer" size={14}/> Cetak Struk</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL: PRODUCT FORM */}
                    {editProduct && (
                        <div className="fixed inset-0 z-[150] flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-sm animate-in no-print">
                            <form onSubmit={saveProduct} className="bg-white rounded-[2.5rem] w-full max-w-xl p-8 space-y-6 shadow-2xl border border-slate-200">
                                <div className="flex justify-between items-center mb-2">
                                    <h2 className="text-xl font-extrabold text-slate-800 uppercase tracking-tight">{editProduct.id ? 'Edit Menu' : 'Tambah Menu Baru'}</h2>
                                    <button type="button" onClick={() => setEditProduct(null)} className="text-slate-300 hover:text-slate-500"><Icon name="X" /></button>
                                </div>
                                <div className="grid grid-cols-2 gap-5">
                                    <div className="col-span-2 space-y-1.5">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Nama Item</label>
                                        <input required name="name" defaultValue={editProduct.name} className="w-full p-3.5 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-blue-500 font-bold" />
                                    </div>
                                    <div className="space-y-1.5">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">SKU / Kode</label>
                                        <input required name="sku" defaultValue={editProduct.sku} className="w-full p-3.5 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-blue-500 font-bold" />
                                    </div>
                                    <div className="space-y-1.5">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Kategori</label>
                                        <select name="category" defaultValue={editProduct.category} className="w-full p-3.5 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-blue-500 font-bold appearance-none">
                                            <option>Minuman</option>
                                            <option>Makanan</option>
                                            <option>Camilan</option>
                                            <option>Lainnya</option>
                                        </select>
                                    </div>
                                    <div className="space-y-1.5">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Harga Beli (Modal)</label>
                                        <input required type="number" min="0" name="cost" defaultValue={editProduct.cost} className="w-full p-3.5 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-blue-500 font-bold" />
                                    </div>
                                    <div className="space-y-1.5">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Harga Jual</label>
                                        <input required type="number" min="0" name="price" defaultValue={editProduct.price} className="w-full p-3.5 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-blue-500 font-bold" />
                                    </div>
                                    <div className="space-y-1.5">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Stok Awal</label>
                                        <input required type="number" min="0" name="stock" defaultValue={editProduct.stock} className="w-full p-3.5 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-blue-500 font-bold" />
                                    </div>
                                    <div className="space-y-1.5">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Emoji/Ikon</label>
                                        <input name="image" defaultValue={editProduct.image} className="w-full p-3.5 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-blue-500 font-bold text-xl text-center" />
                                    </div>
                                </div>
                                <div className="flex gap-4 pt-4">
                                    <button type="button" onClick={() => setEditProduct(null)} className="flex-1 py-4 text-slate-400 font-black text-xs uppercase tracking-widest hover:bg-slate-50 rounded-2xl transition-all">Batal</button>
                                    <button type="submit" className="flex-1 py-4 bg-slate-900 text-white rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl hover:bg-black transition-all active:scale-95">Simpan Data</button>
                                </div>
                            </form>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
